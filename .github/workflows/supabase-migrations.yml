name: Deploy Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Read Supabase project ref
        id: supabase-project
        run: |
          PROJECT_REF="$(grep -E '^project_id = ' supabase/config.toml | sed -E 's/project_id = "([^"]+)"/\1/')"
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::project_id nao foi encontrado em supabase/config.toml."
            exit 1
          fi
          echo "project_ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"

      - name: Validate Supabase secrets
        run: |
          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name nao foi encontrado nos Repository secrets."
              exit 1
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Link Supabase project
        run: supabase link --project-ref "${{ steps.supabase-project.outputs.project_ref }}" --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Repair Laboratorio migration history
        run: supabase migration repair --status reverted 20260620170000 || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push database migrations
        id: push-migrations
        continue-on-error: true
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply Laboratorio migration through Supabase pooler
        if: steps.push-migrations.outcome == 'failure'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          REGION="$(curl -sS \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/${{ steps.supabase-project.outputs.project_ref }}" \
            | jq -r '.region')"
          if [ -z "$REGION" ] || [ "$REGION" = "null" ]; then
            echo "::error::Nao foi possivel identificar a regiao do projeto Supabase."
            exit 1
          fi
          PGPASSWORD="$SUPABASE_DB_PASSWORD" psql \
            "host=aws-0-${REGION}.pooler.supabase.com port=6543 dbname=postgres user=postgres.${{ steps.supabase-project.outputs.project_ref }} sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -f supabase/migrations/20260620170000_add_laboratorio_amostras.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
