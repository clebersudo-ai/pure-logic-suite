name: Deploy Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase secrets
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL não foi encontrado nos Repository secrets."
            exit 1
          fi

          if ! [[ "$SUPABASE_DB_URL" =~ ^postgres(ql)?:// ]]; then
            echo "::error::SUPABASE_DB_URL deve ser a connection string Postgres do Supabase."
            exit 1
          fi
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Normalize database connection
        shell: bash
        run: |
          python - <<'PY'
          import os
          from urllib.parse import quote, unquote

          raw = os.environ["SUPABASE_DB_URL"]
          scheme, remainder = raw.split("://", 1)
          userinfo, host = remainder.rsplit("@", 1)
          username, password = userinfo.split(":", 1)
          normalized = (
              f"{scheme}://{quote(unquote(username), safe='')}:"
              f"{quote(unquote(password), safe='')}@{host}"
          )

          print(f"::add-mask::{normalized}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"SUPABASE_DB_URL_NORMALIZED={normalized}\n")
          PY
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Push database migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL_NORMALIZED"
